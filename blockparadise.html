<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Block Paradise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="site">

        <!-- HEADER -->

        <!-- HEADER -->

        <div class="header">

            <div class="left">
                <div class="logo">
                    <img src="logo.png">
                </div>

                <div class="welcome">
                    Welcome to Block Paradise
                </div>
            </div>

            <nav class="nav">
                <a href="card.html">
                    <div class="cart-btn" onclick="goCheckout()">🛒Cart (0)</div>
                </a>
                <a href="#menu">Shop</a>
                <a href="https://maps.app.goo.gl/x3zyUQthMNTmc6cx5">Location</a>
                <a href="admin.html" id="adminLink" style="display:none">👑 Admin</a>
                <a href="login.html" id="loginLink">Log in</a>
            </nav>

        </div>

        <!-- BANNERS -->

        <section class="banners">

            <div class="banner">
                <img src="b.jpg">
            </div>

            <div class="banner">
                <img src="block.jpg">
            </div>

        </section>

        <h2 class="section-title">Our products</h2>

        <h3 class="label" id="menu">Block paradise</h3>
        <section class="products" id="blockList"></section>

        <h3 class="label">Blind Box</h3>
        <section class="products" id="blindList"></section>

    </div>

    <script src="blockparadise.js"></script>

    <script type="module">
        import { isLoggedIn, logout } from './api.js';

        document.addEventListener('DOMContentLoaded', () => {
            const loginLink = document.getElementById('loginLink');
            const adminLink = document.getElementById('adminLink');

            if (isLoggedIn()) {
                const name = localStorage.getItem('username');
                const isAdmin = (() => {
                    try {
                        const payload = JSON.parse(atob(localStorage.getItem('token').split('.')[1]));
                        return payload.isAdmin === true;
                    } catch { return false; }
                })();

                if (loginLink) {
                    loginLink.textContent = name + ' | Logout';
                    loginLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        logout();
                        window.location.href = 'login.html';
                    });
                }

                if (adminLink && isAdmin) {
                    adminLink.style.display = 'inline-block';
                }
            }
        });
    </script>

</body>

</html>
