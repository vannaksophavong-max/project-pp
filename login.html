<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login/Register UI</title>
  <link rel="stylesheet" href="log.css" />
  <style>


  </style>
</head>

<body>

  <div class="container">
    <div class="tabs">
      <button id="loginTab" class="active">Login</button>
      <button id="registerTab">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="form active">
      <input type="email" placeholder="Email" required value="" />
      <input type="password" placeholder="Password" required />
      <button type="submit" class="btn"><i class="fa fa-sign-in-alt"></i> Login</button>
      <p class="or">Or continue with</p>
      <div class="socials">
        <button class="social">G</button>
        <button class="social">f</button>
        <button class="social">t</button>
      </div>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="form">
      <input type="text" placeholder="Full Name" required />
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <input type="password" placeholder="Confirm Password" required />
      <button type="submit" class="btn"><i class="fa fa-user-plus"></i> Register</button>
      <p class="or">Or sign up with</p>
      <div class="socials">
        <button class="social">G</button>
        <button class="social">f</button>
        <button class="social">t</button>
      </div>
    </form>
  </div>
  <b class="boc"></b>
  <b class="box"></b>
  <b class="by"></b>


  <script type="module">
    import { login, register } from './api.js';

    // Tab switching
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    loginTab.addEventListener("click", () => {
      loginTab.classList.add("active");
      registerTab.classList.remove("active");
      loginForm.classList.add("active");
      registerForm.classList.remove("active");
    });

    registerTab.addEventListener("click", () => {
      registerTab.classList.add("active");
      loginTab.classList.remove("active");
      registerForm.classList.add("active");
      loginForm.classList.remove("active");
    });

    // LOGIN
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = loginForm.querySelector('input[type="email"]').value;
      const password = loginForm.querySelector('input[type="password"]').value;
      const result = await login(email, password);
      if (result.token) {
        alert("Login successful! Welcome " + result.user.username);
        window.location.href = "blockparadise.html";
      } else {
        alert(result.message || "Login failed");
      }
    });

    // REGISTER
    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const inputs = registerForm.querySelectorAll('input');
      const username = inputs[0].value;
      const email = inputs[1].value;
      const password = inputs[2].value;
      const confirm = inputs[3].value;
      if (password !== confirm) { alert("Passwords do not match"); return; }
      const result = await register(username, email, password);
      if (result.userId) {
        alert("Account created! Please log in.");
        loginTab.click();
      } else {
        alert(result.message || "Registration failed");
      }
    });

  </script>
</body>

</html>
